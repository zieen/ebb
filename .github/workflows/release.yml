name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            bin_name: ebb
          - os: macos-13
            label: macos-x86_64
            bin_name: ebb
          - os: windows-latest
            label: windows-x86_64
            bin_name: ebb.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          tar -czf "ebb-${{ matrix.label }}.tar.gz" -C dist "${{ matrix.bin_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebb-${{ matrix.label }}
          path: ebb-${{ matrix.label }}.tar.gz

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ebb-${{ matrix.label }}.tar.gz
